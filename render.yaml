services:
  # Configure the Node.js Backend
  - type: web
    name: backend-service
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Render will automatically inject PORT

  # Configure the Next.js Frontend
  - type: web
    name: frontend-service
    env: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # We dynamically link the socket URL to the backend's external URL generated by Render
      - key: NEXT_PUBLIC_SOCKET_URL
        fromService:
          type: web
          name: backend-service
          envVarKey: RENDER_EXTERNAL_URL
