services:
  # ----------------------------------------
  # BACKEND (Node.js API + Socket.io Server)
  # ----------------------------------------
  - type: web
    name: jam-session-backend
    env: node
    plan: free # <--- FREE TIER
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false # Set manually in Render dashboard

  # ----------------------------------------
  # FRONTEND (Vite React App)
  # ----------------------------------------
  - type: web
    name: jam-session-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_ENV
        value: production
      # Securely map the Socket API URL from the deployed backend above
      - key: VITE_SOCKET_URL
        fromService:
          type: web
          name: jam-session-backend
          envVarKey: RENDER_EXTERNAL_URL
